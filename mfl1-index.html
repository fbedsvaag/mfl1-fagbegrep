<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fagbegrep – MFL1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #EBEBEA;
    --card: #ffffff;
    --card-back: #1C5738;
    --text: #142E1E;
    --text-light: #f5f5f3;
    --accent: #1C5738;
    --accent-hover: #134027;
    --muted: #375240;
    --border: #C2D8C8;
    --accent-light: #D5EDBA;
    --shadow: 0 8px 32px rgba(20,46,30,0.10);
    --radius: 14px;
    --correct: #22865a;
    --wrong: #c0392b;
    --quiz-bg: #f0f7f2;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    max-width: 600px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* MODE SELECTOR */
  .mode-selector {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin: 1.5rem 0;
    flex-wrap: wrap;
    padding: 0 1rem;
  }

  .mode-btn {
    padding: 0.55rem 1.1rem;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* TOPIC GRID */
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.5rem;
    max-width: 640px;
    width: 100%;
    padding: 0 1rem;
    margin-bottom: 1.5rem;
  }

  .topic-btn {
    padding: 0.6rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .topic-btn:hover { border-color: var(--accent); }
  .topic-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .topic-btn span {
    font-size: 0.72rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .topic-btn.active span { color: rgba(255,255,255,0.7); }

  /* SEARCH */
  .search-container {
    max-width: 540px;
    width: 100%;
    padding: 0 1rem;
    margin-bottom: 1rem;
  }

  .search-input {
    width: 100%;
    padding: 0.7rem 1rem 0.7rem 2.6rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }

  .search-wrapper {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.95rem;
    pointer-events: none;
  }

  /* TERM LIST */
  .term-list {
    max-width: 640px;
    width: 100%;
    padding: 0 1rem;
    margin-bottom: 2rem;
  }

  .term-list-header {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin: 1.2rem 0 0.5rem;
    padding-left: 0.2rem;
  }

  .term-item {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.4rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .term-item:hover { border-color: var(--accent); }

  .term-item .term-name {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 0.15rem;
  }

  .term-item .term-cat {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .term-item .term-def {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.55;
    margin-top: 0.5rem;
    display: none;
  }

  .term-item.expanded .term-def { display: block; }

  .term-count {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* CARD AREA */
  .card-area {
    width: 100%;
    max-width: 540px;
    padding: 0 1rem;
    perspective: 1000px;
    margin-bottom: 1rem;
  }

  .card-container {
    width: 100%;
    min-height: 260px;
    cursor: pointer;
    position: relative;
    transition: transform 0.5s, height 0.3s;
    transform-style: preserve-3d;
  }

  .card-container.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem 2.2rem;
    box-shadow: var(--shadow);
  }

  .card-front {
    background: var(--card);
  }

  .card-front .card-topic {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 0.8rem;
  }

  .card-front .card-term {
    font-family: 'DM Serif Display', serif;
    font-size: 1.65rem;
    text-align: center;
    line-height: 1.3;
  }

  .card-front .card-hint {
    margin-top: 1.2rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .card-back {
    background: var(--card-back);
    color: var(--text-light);
    transform: rotateY(180deg);
  }

  .card-back .card-term-small {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    margin-bottom: 0.8rem;
    color: var(--accent-light);
  }

  .card-back .card-definition {
    font-size: 0.92rem;
    line-height: 1.65;
    text-align: center;
    max-width: 420px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .nav-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text);
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .progress {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    min-width: 80px;
    text-align: center;
  }

  .shuffle-btn {
    padding: 0.5rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--text);
    transition: all 0.2s;
  }

  .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* PROGRESS BAR */
  .progress-bar-container {
    max-width: 540px;
    width: 100%;
    padding: 0 1rem;
    margin-bottom: 2rem;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* KEYBOARD HINT */
  .keyboard-hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    padding-bottom: 2rem;
  }

  .keyboard-hint kbd {
    display: inline-block;
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    background: var(--card);
    margin: 0 1px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-state p { font-size: 0.95rem; }

  /* QUIZ MODE */
  .quiz-area {
    max-width: 540px;
    width: 100%;
    padding: 0 1rem;
    margin-bottom: 2rem;
  }

  .quiz-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 2rem;
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
  }

  .quiz-card .quiz-topic {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .quiz-card .quiz-definition {
    font-size: 0.95rem;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .quiz-option {
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .quiz-option:hover:not(.disabled) { border-color: var(--accent); background: var(--quiz-bg); }
  .quiz-option.correct { border-color: var(--correct); background: #e8f5e9; color: var(--correct); }
  .quiz-option.wrong { border-color: var(--wrong); background: #fce4e4; color: var(--wrong); }
  .quiz-option.disabled { cursor: default; opacity: 0.6; }
  .quiz-option.disabled.correct { opacity: 1; }

  .quiz-progress {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .quiz-score-bar {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .quiz-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }

  .quiz-dot.correct { background: var(--correct); }
  .quiz-dot.wrong { background: var(--wrong); }

  .quiz-next-btn {
    display: block;
    margin: 1rem auto 0;
    padding: 0.6rem 1.8rem;
    border: none;
    border-radius: 99px;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .quiz-next-btn:hover { background: var(--accent-hover); }

  .quiz-result {
    background: var(--card);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .quiz-result h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }

  .quiz-result .score-big {
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent);
    margin: 0.5rem 0;
  }

  .quiz-result p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  .quiz-wrong-list {
    text-align: left;
    margin: 1.5rem 0;
    padding: 1rem;
    background: var(--quiz-bg);
    border-radius: 10px;
  }

  .quiz-wrong-list h3 {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .quiz-wrong-item {
    font-size: 0.85rem;
    line-height: 1.5;
    margin-bottom: 0.5rem;
    padding-left: 0.5rem;
    border-left: 2px solid var(--wrong);
  }

  .quiz-wrong-item strong {
    color: var(--text);
  }

  footer {
    text-align: center;
    padding: 2rem 1rem 2.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: auto;
    line-height: 1.6;
  }

  footer a { color: var(--accent); }

  @media (max-width: 500px) {
    header h1 { font-size: 1.6rem; }
    .card-front .card-term { font-size: 1.35rem; }
    .card-face { padding: 1.5rem 1.4rem; }
    .topic-grid { grid-template-columns: repeat(2, 1fr); }
    .mode-btn { font-size: 0.76rem; padding: 0.5rem 0.85rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Fagbegrep MFL1</h1>
  <p>Trykk på kortet for å se forklaringen</p>
</header>

<div class="mode-selector">
  <button class="mode-btn active" onclick="setMode('all', this)">Alle begreper</button>
  <button class="mode-btn" onclick="setMode('topic', this)">Velg tema</button>
  <button class="mode-btn" onclick="setMode('list', this)">Begrepsliste</button>
  <button class="mode-btn" onclick="setMode('quiz', this)">Test deg selv</button>
</div>

<div class="topic-grid" id="topicGrid" style="display:none"></div>

<!-- SEARCH (for list mode) -->
<div class="search-container" id="searchContainer" style="display:none">
  <div class="search-wrapper">
    <span class="search-icon">&#128269;</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Søk etter begrep ..." oninput="filterList()">
  </div>
</div>

<!-- TERM LIST -->
<div class="term-list" id="termList" style="display:none"></div>

<!-- CARD AREA -->
<div class="card-area" id="cardArea" style="display:none">
  <div class="card-container" id="card" onclick="flipCard()">
    <div class="card-face card-front">
      <div class="card-topic" id="cardTopic"></div>
      <div class="card-term" id="cardTerm"></div>
      <div class="card-hint">Trykk for å snu</div>
    </div>
    <div class="card-face card-back">
      <div class="card-term-small" id="cardTermBack"></div>
      <div class="card-definition" id="cardDef"></div>
    </div>
  </div>
</div>

<div class="controls" id="controls" style="display:none">
  <button class="nav-btn" onclick="prevCard()">&#8592;</button>
  <div class="progress" id="progress"></div>
  <button class="nav-btn" onclick="nextCard()">&#8594;</button>
  <button class="shuffle-btn" onclick="shuffleDeck()">Stokk om</button>
</div>

<div class="progress-bar-container" id="progressBarContainer" style="display:none">
  <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
</div>

<div class="empty-state" id="emptyState" style="display:none">
  <p>Velg ett eller flere temaer for å starte.</p>
</div>

<!-- QUIZ AREA -->
<div class="quiz-area" id="quizArea" style="display:none"></div>

<div class="keyboard-hint" id="keyHint" style="display:none">
  <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> bla &nbsp; <kbd>mellomrom</kbd> snu
</div>

<script>
const TERMS = [
  // Markedsføring og bærekraft
  {t:"Bærekraft",d:"Utvikling som imøtekommer dagens behov uten å ødelegge mulighetene for at kommende generasjoner skal få dekket sine behov.",c:"Markedsføring og bærekraft"},
  {t:"FNs bærekraftsmål",d:"En felles arbeidsplan for å utrydde fattigdom, bekjempe ulikhet og stoppe klimaendringer.",c:"Markedsføring og bærekraft"},
  {t:"Samfunnsansvar",d:"Forpliktelse bedriften har til å skape en bærekraftig økonomisk utvikling i samarbeid med de ansatte, deres familie, lokalsamfunnet og samfunnet for øvrig, for å øke vår alles livskvalitet.",c:"Markedsføring og bærekraft"},
  {t:"Sirkulær økonomi",d:"Et prinsipp innenfor økonomisk virksomhet som har som mål at ressurser blir i økonomien lengst mulig.",c:"Markedsføring og bærekraft"},
  {t:"Sirkulært produkt",d:"Produkt bestående av råvarer som kan gjenbrukes for å skape nye produkter.",c:"Markedsføring og bærekraft"},

  // Forbrukeratferd
  {t:"Forbruker",d:"Privatperson som kjøper varer og tjenester av forretningsdrivende, hovedsakelig til eget bruk.",c:"Forbrukeratferd"},
  {t:"Forbrukeratferd",d:"Det forbrukere gjør når de søker etter, kjøper, bruker og evaluerer varer og tjenester som de tror tilfredsstiller deres behov.",c:"Forbrukeratferd"},
  {t:"Holdning",d:"En persons innstilling til bestemte objekter, mennesker, ideer, verdier osv.",c:"Forbrukeratferd"},
  {t:"Kjøpsprosessen",d:"Prosessen kjøperen gjennomgår fra han føler et behov til han foretar en kjøpsbeslutning, for så å bedømme produktet og kjøpet i etterkant.",c:"Forbrukeratferd"},
  {t:"Kultur",d:"Ideer, verdier, regler og normer som et menneske overtar fra andre mennesker i et samfunn, og som det forsøker å bringe videre til mennesker som kommer etter, ofte i endret form.",c:"Forbrukeratferd"},
  {t:"Maslows behovspyramide",d:"Kjent teori om hvordan menneskenes behov kan ordnes i et hierarkisk system fra de mest grunnleggende behovene til behov for selvrealisering og opplevelser.",c:"Forbrukeratferd"},
  {t:"Motivasjon",d:"Drivkreftene bak våre handlinger.",c:"Forbrukeratferd"},
  {t:"Persepsjon",d:"Hvordan vi velger ut, organiserer og tolker sanseinntrykk slik at vi får et meningsfylt bilde av det vi opplever.",c:"Forbrukeratferd"},
  {t:"Referansegruppe",d:"Grupper som vi er medlem av, og som påvirker våre verdier, holdninger og kjøpsatferd.",c:"Forbrukeratferd"},

  // Grunnleggende beslutninger i markedsføringsledelse
  {t:"Bedrift",d:"Virksomhet som søker å skape noe av verdi for sine eiere, kunder, medarbeidere, øvrige partnere og samfunnet.",c:"Grunnleggende beslutninger"},
  {t:"Virksomhet",d:"Organisasjon som produserer varer eller tjenester. Vi skiller mellom private og offentlige virksomheter, kommersielle og ikke-kommersielle.",c:"Grunnleggende beslutninger"},
  {t:"Marked",d:"Samling av kjøpere og selgere som forhandler om et spesielt produkt eller en gruppe produkter.",c:"Grunnleggende beslutninger"},
  {t:"Markedsføring",d:"En prosess som går ut på å skaffe kunder og bygge sterke kunderelasjoner gjennom å skape verdier for kundene, som i sin tur bidrar til verdiskaping for organisasjonen.",c:"Grunnleggende beslutninger"},
  {t:"Markedsføringsledelse",d:"Begrep som brukes innenfor markedsføringsteorien, og som understreker at markedsføring og ledelse er to sider av samme sak.",c:"Grunnleggende beslutninger"},
  {t:"Forretningsidé",d:"De forretningsmulighetene som vi finner frem til ut fra markedsbehov, kunder, produkter og konkurransefortrinn.",c:"Grunnleggende beslutninger"},
  {t:"Visjon",d:"Et fremtidsbilde og noe vi ønsker skal skje.",c:"Grunnleggende beslutninger"},
  {t:"Mål",d:"En ønsket tilstand på et fremtidig tidspunkt.",c:"Grunnleggende beslutninger"},
  {t:"Overordnede mål",d:"Selve grunnlaget for en organisasjons virksomhet. En bedrifts overordnede mål er å oppnå størst mulig overskudd.",c:"Grunnleggende beslutninger"},
  {t:"Strategi",d:"Middel for å nå et mål.",c:"Grunnleggende beslutninger"},
  {t:"Overordnede strategier",d:"Strategier som benyttes for å nå de overordnede målene.",c:"Grunnleggende beslutninger"},
  {t:"Markedsmål",d:"Mål for virksomhetens markedsføring i markedsplanleggingsperioden, gjerne et år frem i tid.",c:"Grunnleggende beslutninger"},
  {t:"Markedsplan",d:"Plan for markedsføringen det kommende året, som blant annet inneholder situasjonsanalyse, målformulering, markedsstrategier og kampanjeplaner.",c:"Grunnleggende beslutninger"},
  {t:"Markedsplanlegging",d:"En bevisst og systematisk innsamling og analyse av markedsdata, fastsetting av markedsmål og valg av virkemidler for å nå målene.",c:"Grunnleggende beslutninger"},
  {t:"Markedsstrategi",d:"Tiltak for å nå markedsmålene. Markedsstrategien omfatter valg av målgruppe og bruk av virkemidlene produkt, pris, distribusjon og markedskommunikasjon.",c:"Grunnleggende beslutninger"},
  {t:"Kampanjeplan",d:"Plan for markedsaktivitetene innenfor en viss periode.",c:"Grunnleggende beslutninger"},
  {t:"Markedsandel",d:"En aktørs andel av et bestemt marked.",c:"Grunnleggende beslutninger"},
  {t:"Markedsinformasjonssystem (MIS)",d:"Et ledelsessystem laget for å støtte og forenkle beslutninger som har med markedsføring å gjøre.",c:"Grunnleggende beslutninger"},

const topics = [...new Set(TERMS.map(t => t.c))];
let currentMode = 'all';
let selectedTopics = new Set();
let deck = [];
let currentIndex = 0;

// ── QUIZ STATE ──
let quizDeck = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswers = []; // {correct: bool, term, userAnswer, correctAnswer}
const QUIZ_LENGTH = 20;

// ── MODE SWITCHING ──
function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Hide everything
  document.getElementById('topicGrid').style.display = 'none';
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('progressBarContainer').style.display = 'none';
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('searchContainer').style.display = 'none';
  document.getElementById('termList').style.display = 'none';
  document.getElementById('quizArea').style.display = 'none';

  selectedTopics.clear();

  if (mode === 'all') {
    buildDeck();
  } else if (mode === 'topic') {
    document.getElementById('topicGrid').style.display = 'grid';
    renderTopics();
    document.getElementById('emptyState').style.display = 'block';
  } else if (mode === 'list') {
    document.getElementById('searchContainer').style.display = 'block';
    document.getElementById('termList').style.display = 'block';
    document.getElementById('searchInput').value = '';
    renderList();
  } else if (mode === 'quiz') {
    startQuiz();
  }
}

// ── TOPICS ──
function renderTopics() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  topics.forEach(topic => {
    const count = TERMS.filter(t => t.c === topic).length;
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.innerHTML = `${topic}<span>${count} begreper</span>`;
    btn.onclick = () => toggleTopic(topic, btn);
    grid.appendChild(btn);
  });
}

function toggleTopic(topic, btn) {
  if (selectedTopics.has(topic)) {
    selectedTopics.delete(topic);
    btn.classList.remove('active');
  } else {
    selectedTopics.add(topic);
    btn.classList.add('active');
  }
  if (selectedTopics.size > 0) {
    buildDeck();
  } else {
    hideCard();
  }
}

function hideCard() {
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('progressBarContainer').style.display = 'none';
  document.getElementById('keyHint').style.display = 'none';
  document.getElementById('emptyState').style.display = currentMode === 'topic' ? 'block' : 'none';
}

// ── FLASHCARD DECK ──
function buildDeck() {
  if (currentMode === 'all') {
    deck = [...TERMS];
  } else {
    deck = TERMS.filter(t => selectedTopics.has(t.c));
  }
  shuffleArray(deck);
  currentIndex = 0;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('progressBarContainer').style.display = 'block';
  document.getElementById('keyHint').style.display = 'block';
  showCard();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  const term = deck[currentIndex];
  document.getElementById('cardTopic').textContent = term.c;
  document.getElementById('cardTerm').textContent = term.t;
  document.getElementById('cardTermBack').textContent = term.t;
  document.getElementById('cardDef').textContent = term.d;
  document.getElementById('progress').textContent = `${currentIndex + 1} / ${deck.length}`;
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / deck.length) * 100}%`;
  requestAnimationFrame(() => {
    const front = document.querySelector('.card-front');
    const back = document.querySelector('.card-back');
    const h = Math.max(260, front.scrollHeight, back.scrollHeight);
    card.style.height = h + 'px';
  });
}

function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
function nextCard() { if (currentIndex < deck.length - 1) { currentIndex++; showCard(); } }
function prevCard() { if (currentIndex > 0) { currentIndex--; showCard(); } }
function shuffleDeck() { shuffleArray(deck); currentIndex = 0; showCard(); }

function renderList(filter = '') {
  const list = document.getElementById('termList');
  const sorted = [...TERMS].sort((a, b) => a.t.localeCompare(b.t, 'nb'));
  const lowerFilter = filter.toLowerCase();
  const filtered = lowerFilter
    ? sorted.filter(t => t.t.toLowerCase().includes(lowerFilter) || t.d.toLowerCase().includes(lowerFilter) || t.c.toLowerCase().includes(lowerFilter))
    : sorted;

  list.innerHTML = '';

  if (filter) {
    // Flat list when searching
    list.innerHTML = `<div class="term-count">${filtered.length} treff</div>`;
    filtered.forEach(term => {
      list.appendChild(createTermItem(term));
    });
  } else {
    // Grouped by theme
    const grouped = {};
    filtered.forEach(t => {
      if (!grouped[t.c]) grouped[t.c] = [];
      grouped[t.c].push(t);
    });
    const themeOrder = topics;
    themeOrder.forEach(theme => {
      if (!grouped[theme]) return;
      const header = document.createElement('div');
      header.className = 'term-list-header';
      header.textContent = `${theme} (${grouped[theme].length})`;
      list.appendChild(header);
      grouped[theme].sort((a, b) => a.t.localeCompare(b.t, 'nb')).forEach(term => {
        list.appendChild(createTermItem(term, true));
      });
    });
    list.insertAdjacentHTML('afterbegin', `<div class="term-count">${TERMS.length} begreper totalt</div>`);
  }
}

function createTermItem(term, hideCategory = false) {
  const item = document.createElement('div');
  item.className = 'term-item';
  item.innerHTML = `
    <div class="term-name">${term.t}</div>
    ${hideCategory ? '' : `<div class="term-cat">${term.c}</div>`}
    <div class="term-def">${term.d}</div>
  `;
  item.onclick = () => item.classList.toggle('expanded');
  return item;
}

function filterList() {
  const query = document.getElementById('searchInput').value;
  renderList(query);
}

// ── QUIZ ──
function startQuiz() {
  const area = document.getElementById('quizArea');
  area.style.display = 'block';
  quizDeck = [...TERMS];
  shuffleArray(quizDeck);
  quizDeck = quizDeck.slice(0, QUIZ_LENGTH);
  quizIndex = 0;
  quizScore = 0;
  quizAnswers = [];
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const area = document.getElementById('quizArea');
  if (quizIndex >= quizDeck.length) {
    renderQuizResult();
    return;
  }

  const current = quizDeck[quizIndex];
  // Get 3 wrong options
  const others = TERMS.filter(t => t.t !== current.t);
  shuffleArray(others);
  const wrongOptions = others.slice(0, 3);
  const options = [current, ...wrongOptions];
  shuffleArray(options);

  let dotsHtml = '';
  for (let i = 0; i < QUIZ_LENGTH; i++) {
    let cls = 'quiz-dot';
    if (i < quizAnswers.length) {
      cls += quizAnswers[i].correct ? ' correct' : ' wrong';
    }
    dotsHtml += `<div class="${cls}"></div>`;
  }

  area.innerHTML = `
    <div class="quiz-progress">Spørsmål ${quizIndex + 1} av ${QUIZ_LENGTH}</div>
    <div class="quiz-score-bar">${dotsHtml}</div>
    <div class="quiz-card">
      <div class="quiz-topic">${current.c}</div>
      <div class="quiz-definition">${current.d}</div>
      <div class="quiz-options" id="quizOptions">
        ${options.map((o, i) => `
          <button class="quiz-option" onclick="answerQuiz(${i}, '${escapeForAttr(o.t)}', '${escapeForAttr(current.t)}')">${o.t}</button>
        `).join('')}
      </div>
    </div>
  `;
}

function escapeForAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function answerQuiz(clickedIdx, chosen, correct) {
  const buttons = document.querySelectorAll('.quiz-option');
  const isCorrect = chosen === correct;

  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.onclick = null;
    if (btn.textContent.trim() === correct) {
      btn.classList.add('correct');
    }
    if (i === clickedIdx && !isCorrect) {
      btn.classList.add('wrong');
    }
  });

  if (isCorrect) quizScore++;
  quizAnswers.push({
    correct: isCorrect,
    term: correct,
    userAnswer: chosen,
    correctAnswer: correct,
    definition: quizDeck[quizIndex].d
  });

  // Update dots
  const dots = document.querySelectorAll('.quiz-dot');
  dots[quizIndex].classList.add(isCorrect ? 'correct' : 'wrong');

  // Show next button
  const card = document.querySelector('.quiz-card');
  const nextBtn = document.createElement('button');
  nextBtn.className = 'quiz-next-btn';
  nextBtn.textContent = quizIndex < QUIZ_LENGTH - 1 ? 'Neste' : 'Se resultat';
  nextBtn.onclick = () => { quizIndex++; renderQuizQuestion(); };
  card.appendChild(nextBtn);
}

function renderQuizResult() {
  const area = document.getElementById('quizArea');
  const pct = Math.round((quizScore / QUIZ_LENGTH) * 100);
  let message = '';
  if (pct === 100) message = 'Perfekt! Du kan dette stoffet!';
  else if (pct >= 80) message = 'Veldig bra! Du har god kontroll.';
  else if (pct >= 60) message = 'Ganske bra, men det er rom for forbedring.';
  else if (pct >= 40) message = 'Du er på riktig vei, men bør repetere mer.';
  else message = 'Her bør du bruke litt mer tid på begrepene.';

  const wrongOnes = quizAnswers.filter(a => !a.correct);
  let wrongHtml = '';
  if (wrongOnes.length > 0) {
    wrongHtml = `
      <div class="quiz-wrong-list">
        <h3>Begreper du bør se på igjen</h3>
        ${wrongOnes.map(w => `
          <div class="quiz-wrong-item">
            <strong>${w.term}</strong><br>
            ${w.definition}
          </div>
        `).join('')}
      </div>
    `;
  }

  let dotsHtml = '';
  for (let i = 0; i < QUIZ_LENGTH; i++) {
    let cls = 'quiz-dot';
    cls += quizAnswers[i].correct ? ' correct' : ' wrong';
    dotsHtml += `<div class="${cls}"></div>`;
  }

  area.innerHTML = `
    <div class="quiz-result">
      <h2>Resultat</h2>
      <div class="quiz-score-bar" style="margin-top:1rem">${dotsHtml}</div>
      <div class="score-big">${quizScore} / ${QUIZ_LENGTH}</div>
      <p>${message}</p>
      ${wrongHtml}
      <button class="quiz-next-btn" onclick="startQuiz()">Prøv igjen</button>
    </div>
  `;
}

// ── KEYBOARD & TOUCH ──
document.addEventListener('keydown', e => {
  if (currentMode === 'list' || currentMode === 'quiz') return;
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

let touchStartX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, {passive: true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 60) {
    if (diff < 0) nextCard();
    else prevCard();
  }
}, {passive: true});

// ── INIT ──
buildDeck();
</script>
