<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fagbegrep – MFL1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #EBEBEA;
    --card: #ffffff;
    --card-back: #1C5738;
    --text: #142E1E;
    --text-light: #f5f5f3;
    --accent: #1C5738;
    --accent-hover: #134027;
    --muted: #375240;
    --border: #C2D8C8;
    --accent-light: #D5EDBA;
    --shadow: 0 8px 32px rgba(20,46,30,0.10);
    --radius: 14px;
    --correct: #22865a;
    --wrong: #c0392b;
    --quiz-bg: #f0f7f2;
    --amber: #b8860b;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { text-align: center; padding: 2.5rem 1rem 1rem; max-width: 600px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
  header p { color: var(--muted); font-size: 0.9rem; }

  .mode-selector { display: flex; gap: 0.5rem; justify-content: center; margin: 1.5rem 0; flex-wrap: wrap; padding: 0 1rem; }
  .mode-btn { padding: 0.55rem 1.1rem; border: 1.5px solid var(--border); border-radius: 99px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s; }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; max-width: 640px; width: 100%; padding: 0 1rem; margin-bottom: 1.5rem; }
  .topic-btn { padding: 0.6rem 0.8rem; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s; text-align: left; }
  .topic-btn:hover { border-color: var(--accent); }
  .topic-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .topic-btn span { font-size: 0.72rem; color: var(--muted); display: block; margin-top: 2px; }
  .topic-btn.active span { color: rgba(255,255,255,0.7); }

  .search-container { max-width: 540px; width: 100%; padding: 0 1rem; margin-bottom: 1rem; }
  .search-input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; background: var(--card); color: var(--text); outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-wrapper { position: relative; }
  .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.95rem; pointer-events: none; }

  .term-list { max-width: 640px; width: 100%; padding: 0 1rem; margin-bottom: 2rem; }
  .term-list-header { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin: 1.2rem 0 0.5rem; padding-left: 0.2rem; }
  .term-item { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.4rem; cursor: pointer; transition: all 0.2s; }
  .term-item:hover { border-color: var(--accent); }
  .term-item .term-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.15rem; display: flex; align-items: center; gap: 0.4rem; }
  .term-item .term-cat { font-size: 0.72rem; color: var(--muted); }
  .term-item .term-def { font-size: 0.85rem; color: var(--muted); line-height: 1.55; margin-top: 0.5rem; display: none; }
  .term-item.expanded .term-def { display: block; }
  .term-count { text-align: center; font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }

  .mastery-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .mastery-dot.m-green { background: var(--correct); }
  .mastery-dot.m-amber { background: var(--amber); }
  .mastery-dot.m-red { background: var(--wrong); }
  .mastery-dot.m-grey { background: var(--border); }

  .card-area { width: 100%; max-width: 540px; padding: 0 1rem; perspective: 1000px; margin-bottom: 1rem; }
  .card-container { width: 100%; min-height: 260px; cursor: pointer; position: relative; transition: transform 0.5s, height 0.3s; transform-style: preserve-3d; }
  .card-container.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem 2.2rem; box-shadow: var(--shadow); }
  .card-front { background: var(--card); }
  .card-front .card-topic { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.8rem; }
  .card-front .card-term { font-family: 'DM Serif Display', serif; font-size: 1.65rem; text-align: center; line-height: 1.3; }
  .card-front .card-hint { margin-top: 1.2rem; font-size: 0.78rem; color: var(--muted); }
  .card-back { background: var(--card-back); color: var(--text-light); transform: rotateY(180deg); }
  .card-back .card-term-small { font-family: 'DM Serif Display', serif; font-size: 1rem; margin-bottom: 0.8rem; color: var(--accent-light); }
  .card-back .card-definition { font-size: 0.92rem; line-height: 1.65; text-align: center; max-width: 420px; }

  .self-assess { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1.2rem; }
  .assess-btn { padding: 0.45rem 1rem; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 99px; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-light); }
  .assess-btn:hover { background: rgba(255,255,255,0.15); }
  .assess-btn.know { border-color: var(--accent-light); color: var(--accent-light); }
  .assess-btn.dunno { border-color: #f5a6a0; color: #f5a6a0; }

  .controls { display: flex; gap: 0.8rem; justify-content: center; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text); }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .progress { font-size: 0.85rem; font-weight: 500; color: var(--muted); min-width: 80px; text-align: center; }
  .shuffle-btn, .filter-btn { padding: 0.5rem 1rem; border: 1.5px solid var(--border); border-radius: 99px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; color: var(--text); transition: all 0.2s; }
  .shuffle-btn:hover, .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .progress-bar-container { max-width: 540px; width: 100%; padding: 0 1rem; margin-bottom: 2rem; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  .keyboard-hint { text-align: center; font-size: 0.75rem; color: var(--muted); padding-bottom: 2rem; }
  .keyboard-hint kbd { display: inline-block; padding: 2px 7px; border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; background: var(--card); margin: 0 1px; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-state p { font-size: 0.95rem; }

  .quiz-area { max-width: 540px; width: 100%; padding: 0 1rem; margin-bottom: 2rem; }
  .quiz-card { background: var(--card); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
  .quiz-card .quiz-topic { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.5rem; }
  .quiz-card .quiz-definition { font-size: 0.95rem; line-height: 1.65; color: var(--text); margin-bottom: 1.5rem; }
  .quiz-options { display: flex; flex-direction: column; gap: 0.5rem; }
  .quiz-option { padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.2s; text-align: left; }
  .quiz-option:hover:not(.disabled) { border-color: var(--accent); background: var(--quiz-bg); }
  .quiz-option.correct { border-color: var(--correct); background: #e8f5e9; color: var(--correct); }
  .quiz-option.wrong { border-color: var(--wrong); background: #fce4e4; color: var(--wrong); }
  .quiz-option.disabled { cursor: default; opacity: 0.6; }
  .quiz-option.disabled.correct { opacity: 1; }
  .quiz-progress { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
  .quiz-score-bar { display: flex; gap: 4px; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .quiz-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .quiz-dot.correct { background: var(--correct); }
  .quiz-dot.wrong { background: var(--wrong); }
  .quiz-next-btn { display: block; margin: 1rem auto 0; padding: 0.6rem 1.8rem; border: none; border-radius: 99px; background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .quiz-next-btn:hover { background: var(--accent-hover); }
  .quiz-result { background: var(--card); border-radius: var(--radius); padding: 2.5rem 2rem; box-shadow: var(--shadow); text-align: center; }
  .quiz-result h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.5rem; }
  .quiz-result .score-big { font-size: 3rem; font-weight: 700; color: var(--accent); margin: 0.5rem 0; }
  .quiz-result p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
  .quiz-wrong-list { text-align: left; margin: 1.5rem 0; padding: 1rem; background: var(--quiz-bg); border-radius: 10px; }
  .quiz-wrong-list h3 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.6rem; }
  .quiz-wrong-item { font-size: 0.85rem; line-height: 1.5; margin-bottom: 0.5rem; padding-left: 0.5rem; border-left: 2px solid var(--wrong); }
  .quiz-wrong-item strong { color: var(--text); }

  .dashboard { max-width: 640px; width: 100%; padding: 0 1rem; margin-bottom: 2rem; }
  .dash-card { background: var(--card); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1rem; }
  .dash-card h2 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 1rem; }
  .dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 0.5rem; }
  .dash-stat { text-align: center; padding: 0.8rem 0.5rem; background: var(--quiz-bg); border-radius: 10px; }
  .dash-stat .stat-num { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
  .dash-stat .stat-num.green { color: var(--correct); }
  .dash-stat .stat-num.amber { color: var(--amber); }
  .dash-stat .stat-num.red { color: var(--wrong); }
  .dash-stat .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
  .dash-bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
  .dash-bar-label { font-size: 0.78rem; font-weight: 500; width: 140px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dash-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; display: flex; }
  .dash-bar-green { height: 100%; background: var(--correct); transition: width 0.3s; }
  .dash-bar-amber { height: 100%; background: var(--amber); transition: width 0.3s; }
  .dash-bar-pct { font-size: 0.72rem; font-weight: 600; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }
  .dash-history { max-height: 200px; overflow-y: auto; }
  .dash-history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .dash-history-item:last-child { border-bottom: none; }
  .dash-history-item .hist-date { color: var(--muted); }
  .dash-history-item .hist-score { font-weight: 600; }
  .dash-empty { text-align: center; color: var(--muted); font-size: 0.88rem; padding: 1.5rem 0; }
  .reset-btn { display: block; margin: 0 auto; padding: 0.45rem 1.2rem; border: 1.5px solid var(--wrong); border-radius: 99px; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; color: var(--wrong); transition: all 0.2s; }
  .reset-btn:hover { background: var(--wrong); color: #fff; }

  footer { text-align: center; padding: 2rem 1rem 2.5rem; font-size: 0.75rem; color: var(--muted); margin-top: auto; line-height: 1.6; }
  footer a { color: var(--accent); }

  @media (max-width: 500px) {
    header h1 { font-size: 1.6rem; }
    .card-front .card-term { font-size: 1.35rem; }
    .card-face { padding: 1.5rem 1.4rem; }
    .topic-grid { grid-template-columns: repeat(2, 1fr); }
    .mode-btn { font-size: 0.76rem; padding: 0.5rem 0.85rem; }
    .dash-bar-label { width: 100px; font-size: 0.72rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Fagbegrep MFL1</h1>
  <p>Trykk på kortet for å se forklaringen</p>
</header>

<div class="mode-selector">
  <button class="mode-btn active" onclick="setMode('all', this)">Alle begreper</button>
  <button class="mode-btn" onclick="setMode('topic', this)">Velg tema</button>
  <button class="mode-btn" onclick="setMode('list', this)">Begrepsliste</button>
  <button class="mode-btn" onclick="setMode('quiz', this)">Test deg selv</button>
  <button class="mode-btn" onclick="setMode('progress', this)">Min fremgang</button>
</div>

<div class="topic-grid" id="topicGrid" style="display:none"></div>
<div class="search-container" id="searchContainer" style="display:none"><div class="search-wrapper"><span class="search-icon">&#128269;</span><input type="text" class="search-input" id="searchInput" placeholder="Søk etter begrep ..." oninput="filterList()"></div></div>
<div class="term-list" id="termList" style="display:none"></div>

<div class="controls" id="flashcardFilter" style="display:none">
  <button class="filter-btn active" onclick="setFlashFilter('all', this)">Alle</button>
  <button class="filter-btn" onclick="setFlashFilter('unseen', this)">Usette</button>
  <button class="filter-btn" onclick="setFlashFilter('practicing', this)">Øver på</button>
</div>

<div class="card-area" id="cardArea" style="display:none">
  <div class="card-container" id="card" onclick="flipCard()">
    <div class="card-face card-front">
      <div class="card-topic" id="cardTopic"></div>
      <div class="card-term" id="cardTerm"></div>
      <div class="card-hint">Trykk for å snu</div>
    </div>
    <div class="card-face card-back">
      <div class="card-term-small" id="cardTermBack"></div>
      <div class="card-definition" id="cardDef"></div>
      <div class="self-assess" id="selfAssess">
        <button class="assess-btn know" onclick="assessTerm(event,'know')">Kan dette &#10003;</button>
        <button class="assess-btn dunno" onclick="assessTerm(event,'practice')">Øver fortsatt</button>
      </div>
    </div>
  </div>
</div>

<div class="controls" id="controls" style="display:none">
  <button class="nav-btn" onclick="prevCard()">&#8592;</button>
  <div class="progress" id="progress"></div>
  <button class="nav-btn" onclick="nextCard()">&#8594;</button>
  <button class="shuffle-btn" onclick="shuffleDeck()">Stokk om</button>
</div>

<div class="progress-bar-container" id="progressBarContainer" style="display:none"><div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div></div>
<div class="empty-state" id="emptyState" style="display:none"><p>Velg ett eller flere temaer for å starte.</p></div>
<div class="quiz-area" id="quizArea" style="display:none"></div>
<div class="dashboard" id="dashboard" style="display:none"></div>
<div class="keyboard-hint" id="keyHint" style="display:none"><kbd>&#8592;</kbd> <kbd>&#8594;</kbd> bla &nbsp; <kbd>mellomrom</kbd> snu</div>

<script>
const TERMS=[
{t:"Bærekraft",d:"Utvikling som imøtekommer dagens behov uten å ødelegge mulighetene for at kommende generasjoner skal få dekket sine behov.",c:"Markedsføring og bærekraft"},
{t:"FNs bærekraftsmål",d:"En felles arbeidsplan for å utrydde fattigdom, bekjempe ulikhet og stoppe klimaendringer.",c:"Markedsføring og bærekraft"},
{t:"Samfunnsansvar",d:"Forpliktelse bedriften har til å skape en bærekraftig økonomisk utvikling i samarbeid med de ansatte, deres familie, lokalsamfunnet og samfunnet for øvrig, for å øke vår alles livskvalitet.",c:"Markedsføring og bærekraft"},
{t:"Sirkulær økonomi",d:"Et prinsipp innenfor økonomisk virksomhet som har som mål at ressurser blir i økonomien lengst mulig.",c:"Markedsføring og bærekraft"},
{t:"Sirkulært produkt",d:"Produkt bestående av råvarer som kan gjenbrukes for å skape nye produkter.",c:"Markedsføring og bærekraft"},
{t:"Forbruker",d:"Privatperson som kjøper varer og tjenester av forretningsdrivende, hovedsakelig til eget bruk.",c:"Forbrukeratferd"},
{t:"Forbrukeratferd",d:"Det forbrukere gjør når de søker etter, kjøper, bruker og evaluerer varer og tjenester som de tror tilfredsstiller deres behov.",c:"Forbrukeratferd"},
{t:"Holdning",d:"En persons innstilling til bestemte objekter, mennesker, ideer, verdier osv.",c:"Forbrukeratferd"},
{t:"Kjøpsprosessen",d:"Prosessen kjøperen gjennomgår fra han føler et behov til han foretar en kjøpsbeslutning, for så å bedømme produktet og kjøpet i etterkant.",c:"Forbrukeratferd"},
{t:"Kultur",d:"Ideer, verdier, regler og normer som et menneske overtar fra andre mennesker i et samfunn, og som det forsøker å bringe videre til mennesker som kommer etter, ofte i endret form.",c:"Forbrukeratferd"},
{t:"Maslows behovspyramide",d:"Kjent teori om hvordan menneskenes behov kan ordnes i et hierarkisk system fra de mest grunnleggende behovene til behov for selvrealisering og opplevelser.",c:"Forbrukeratferd"},
{t:"Motivasjon",d:"Drivkreftene bak våre handlinger.",c:"Forbrukeratferd"},
{t:"Persepsjon",d:"Hvordan vi velger ut, organiserer og tolker sanseinntrykk slik at vi får et meningsfylt bilde av det vi opplever.",c:"Forbrukeratferd"},
{t:"Referansegruppe",d:"Grupper som vi er medlem av, og som påvirker våre verdier, holdninger og kjøpsatferd.",c:"Forbrukeratferd"},
{t:"Bedrift",d:"Virksomhet som søker å skape noe av verdi for sine eiere, kunder, medarbeidere, øvrige partnere og samfunnet.",c:"Grunnleggende beslutninger"},
{t:"Virksomhet",d:"Organisasjon som produserer varer eller tjenester. Vi skiller mellom private og offentlige virksomheter, kommersielle og ikke-kommersielle.",c:"Grunnleggende beslutninger"},
{t:"Marked",d:"Samling av kjøpere og selgere som forhandler om et spesielt produkt eller en gruppe produkter.",c:"Grunnleggende beslutninger"},
{t:"Markedsføring",d:"En prosess som går ut på å skaffe kunder og bygge sterke kunderelasjoner gjennom å skape verdier for kundene, som i sin tur bidrar til verdiskaping for organisasjonen.",c:"Grunnleggende beslutninger"},
{t:"Markedsføringsledelse",d:"Begrep som understreker at markedsføring og ledelse er to sider av samme sak.",c:"Grunnleggende beslutninger"},
{t:"Forretningsidé",d:"De forretningsmulighetene som vi finner frem til ut fra markedsbehov, kunder, produkter og konkurransefortrinn.",c:"Grunnleggende beslutninger"},
{t:"Visjon",d:"Et fremtidsbilde og noe vi ønsker skal skje.",c:"Grunnleggende beslutninger"},
{t:"Mål",d:"En ønsket tilstand på et fremtidig tidspunkt.",c:"Grunnleggende beslutninger"},
{t:"Overordnede mål",d:"Selve grunnlaget for en organisasjons virksomhet. En bedrifts overordnede mål er å oppnå størst mulig overskudd.",c:"Grunnleggende beslutninger"},
{t:"Strategi",d:"Middel for å nå et mål.",c:"Grunnleggende beslutninger"},
{t:"Overordnede strategier",d:"Strategier som benyttes for å nå de overordnede målene.",c:"Grunnleggende beslutninger"},
{t:"Markedsmål",d:"Mål for virksomhetens markedsføring i markedsplanleggingsperioden, gjerne et år frem i tid.",c:"Grunnleggende beslutninger"},
{t:"Markedsplan",d:"Plan for markedsføringen det kommende året, som blant annet inneholder situasjonsanalyse, målformulering, markedsstrategier og kampanjeplaner.",c:"Grunnleggende beslutninger"},
{t:"Markedsplanlegging",d:"En bevisst og systematisk innsamling og analyse av markedsdata, fastsetting av markedsmål og valg av virkemidler for å nå målene.",c:"Grunnleggende beslutninger"},

// ── STORAGE ──
const SK='mfl1_progress';
function lp(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{terms:{},quizHistory:[]};}catch{return{terms:{},quizHistory:[]};}}
function sp(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}
function gts(t){const p=lp();return p.terms[t]||{status:'unseen',qc:0,qw:0};}
function sts(t,s){const p=lp();if(!p.terms[t])p.terms[t]={status:'unseen',qc:0,qw:0};p.terms[t].status=s;sp(p);}
function rqa(t,c){const p=lp();if(!p.terms[t])p.terms[t]={status:'unseen',qc:0,qw:0};if(c)p.terms[t].qc++;else{p.terms[t].qw++;if(p.terms[t].status!=='know')p.terms[t].status='practice';}sp(p);}
function sqr(s,tot){const p=lp();p.quizHistory.push({date:new Date().toISOString(),score:s,total:tot});if(p.quizHistory.length>20)p.quizHistory=p.quizHistory.slice(-20);sp(p);}
function resetProgress(){if(confirm('Er du sikker på at du vil nullstille all fremgang?')){localStorage.removeItem(SK);renderDashboard();}}
function mc(t){const s=gts(t);if(s.status==='know')return 'm-green';if(s.status==='practice')return 'm-amber';if(s.qw>0)return 'm-red';return 'm-grey';}

// ── STATE ──
const topics=[...new Set(TERMS.map(t=>t.c))];
let currentMode='all',selectedTopics=new Set(),deck=[],currentIndex=0,flashFilter='all';
let quizDeck=[],quizIndex=0,quizScore=0,quizAnswers=[];
const QL=20;

// ── MODE ──
function setMode(m,btn){
  currentMode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['topicGrid','cardArea','controls','progressBarContainer','keyHint','emptyState','searchContainer','termList','quizArea','dashboard','flashcardFilter'].forEach(id=>document.getElementById(id).style.display='none');
  selectedTopics.clear();
  if(m==='all'){document.getElementById('flashcardFilter').style.display='flex';buildDeck();}
  else if(m==='topic'){document.getElementById('topicGrid').style.display='grid';renderTopics();document.getElementById('emptyState').style.display='block';}
  else if(m==='list'){document.getElementById('searchContainer').style.display='block';document.getElementById('termList').style.display='block';document.getElementById('searchInput').value='';renderList();}
  else if(m==='quiz'){startQuiz();}
  else if(m==='progress'){document.getElementById('dashboard').style.display='block';renderDashboard();}
}

function renderTopics(){const g=document.getElementById('topicGrid');g.innerHTML='';topics.forEach(topic=>{const c=TERMS.filter(t=>t.c===topic).length;const b=document.createElement('button');b.className='topic-btn';b.innerHTML=`${topic}<span>${c} begreper</span>`;b.onclick=()=>toggleTopic(topic,b);g.appendChild(b);});}
function toggleTopic(topic,btn){if(selectedTopics.has(topic)){selectedTopics.delete(topic);btn.classList.remove('active');}else{selectedTopics.add(topic);btn.classList.add('active');}selectedTopics.size>0?buildDeck():hideCard();}
function hideCard(){document.getElementById('cardArea').style.display='none';document.getElementById('controls').style.display='none';document.getElementById('progressBarContainer').style.display='none';document.getElementById('keyHint').style.display='none';document.getElementById('emptyState').style.display=currentMode==='topic'?'block':'none';}
function setFlashFilter(f,btn){flashFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildDeck();}

// ── DECK ──
function buildDeck(){
  let src=currentMode==='all'?[...TERMS]:TERMS.filter(t=>selectedTopics.has(t.c));
  if(flashFilter==='unseen')src=src.filter(t=>gts(t.t).status==='unseen');
  else if(flashFilter==='practicing')src=src.filter(t=>{const s=gts(t.t);return s.status==='practice'||(s.qw>0&&s.status!=='know');});
  deck=src;shuf(deck);currentIndex=0;
  if(!deck.length){document.getElementById('cardArea').style.display='none';document.getElementById('controls').style.display='none';document.getElementById('progressBarContainer').style.display='none';document.getElementById('keyHint').style.display='none';const es=document.getElementById('emptyState');es.style.display='block';es.querySelector('p').textContent=flashFilter==='unseen'?'Du har sett alle begrepene!':flashFilter==='practicing'?'Ingen begreper å øve på. Prøv en quiz!':'Velg ett eller flere temaer.';return;}
  document.getElementById('emptyState').style.display='none';document.getElementById('cardArea').style.display='block';document.getElementById('controls').style.display='flex';document.getElementById('progressBarContainer').style.display='block';document.getElementById('keyHint').style.display='block';showCard();
}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function showCard(){const c=document.getElementById('card');c.classList.remove('flipped');const t=deck[currentIndex];document.getElementById('cardTopic').textContent=t.c;document.getElementById('cardTerm').textContent=t.t;document.getElementById('cardTermBack').textContent=t.t;document.getElementById('cardDef').textContent=t.d;document.getElementById('progress').textContent=`${currentIndex+1} / ${deck.length}`;document.getElementById('progressFill').style.width=`${((currentIndex+1)/deck.length)*100}%`;requestAnimationFrame(()=>{const f=document.querySelector('.card-front'),b=document.querySelector('.card-back');c.style.height=Math.max(260,f.scrollHeight,b.scrollHeight)+'px';});}
function flipCard(){document.getElementById('card').classList.toggle('flipped');}
function nextCard(){if(currentIndex<deck.length-1){currentIndex++;showCard();}}
function prevCard(){if(currentIndex>0){currentIndex--;showCard();}}
function shuffleDeck(){shuf(deck);currentIndex=0;showCard();}
function assessTerm(e,status){e.stopPropagation();sts(deck[currentIndex].t,status);if(currentIndex<deck.length-1){currentIndex++;showCard();}else{const c=document.getElementById('card');c.classList.remove('flipped');showCard();}}

// ── LIST ──
function renderList(filter=''){
  const list=document.getElementById('termList'),sorted=[...TERMS].sort((a,b)=>a.t.localeCompare(b.t,'nb')),lf=filter.toLowerCase();
  const filtered=lf?sorted.filter(t=>t.t.toLowerCase().includes(lf)||t.d.toLowerCase().includes(lf)||t.c.toLowerCase().includes(lf)):sorted;
  list.innerHTML='';
  if(filter){list.innerHTML=`<div class="term-count">${filtered.length} treff</div>`;filtered.forEach(t=>list.appendChild(cti(t)));}
  else{const gr={};filtered.forEach(t=>{if(!gr[t.c])gr[t.c]=[];gr[t.c].push(t);});topics.forEach(th=>{if(!gr[th])return;const h=document.createElement('div');h.className='term-list-header';h.textContent=`${th} (${gr[th].length})`;list.appendChild(h);gr[th].sort((a,b)=>a.t.localeCompare(b.t,'nb')).forEach(t=>list.appendChild(cti(t,true)));});list.insertAdjacentHTML('afterbegin',`<div class="term-count">${TERMS.length} begreper totalt</div>`);}
}
function cti(term,hc=false){const i=document.createElement('div');i.className='term-item';const m=mc(term.t);i.innerHTML=`<div class="term-name"><span class="mastery-dot ${m}"></span>${term.t}</div>${hc?'':`<div class="term-cat">${term.c}</div>`}<div class="term-def">${term.d}</div>`;i.onclick=()=>i.classList.toggle('expanded');return i;}
function filterList(){renderList(document.getElementById('searchInput').value);}

// ── QUIZ ──
function startQuiz(){const a=document.getElementById('quizArea');a.style.display='block';quizDeck=[...TERMS];shuf(quizDeck);quizDeck=quizDeck.slice(0,QL);quizIndex=0;quizScore=0;quizAnswers=[];rqq();}
function rqq(){
  const a=document.getElementById('quizArea');
  if(quizIndex>=quizDeck.length){rqr();return;}
  const cur=quizDeck[quizIndex],oth=TERMS.filter(t=>t.t!==cur.t);shuf(oth);const opts=[cur,...oth.slice(0,3)];shuf(opts);
  let dots='';for(let i=0;i<QL;i++){let c='quiz-dot';if(i<quizAnswers.length)c+=' '+(quizAnswers[i].correct?'correct':'wrong');dots+=`<div class="${c}"></div>`;}
  a.innerHTML=`<div class="quiz-progress">Spørsmål ${quizIndex+1} av ${QL}</div><div class="quiz-score-bar">${dots}</div><div class="quiz-card"><div class="quiz-topic">${cur.c}</div><div class="quiz-definition">${cur.d}</div><div class="quiz-options">${opts.map((o,i)=>`<button class="quiz-option" onclick="aq(${i},'${esc(o.t)}','${esc(cur.t)}')">${o.t}</button>`).join('')}</div></div>`;
}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function aq(idx,chosen,correct){
  const btns=document.querySelectorAll('.quiz-option'),ok=chosen===correct;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;if(b.textContent.trim()===correct)b.classList.add('correct');if(i===idx&&!ok)b.classList.add('wrong');});
  if(ok)quizScore++;rqa(correct,ok);
  quizAnswers.push({correct:ok,term:correct,userAnswer:chosen,definition:quizDeck[quizIndex].d});
  document.querySelectorAll('.quiz-dot')[quizIndex].classList.add(ok?'correct':'wrong');
  const c=document.querySelector('.quiz-card'),b=document.createElement('button');b.className='quiz-next-btn';b.textContent=quizIndex<QL-1?'Neste':'Se resultat';b.onclick=()=>{quizIndex++;rqq();};c.appendChild(b);
}
function rqr(){
  sqr(quizScore,QL);const a=document.getElementById('quizArea'),pct=Math.round(quizScore/QL*100);
  let msg=pct===100?'Perfekt!':pct>=80?'Veldig bra!':pct>=60?'Ganske bra, men det er rom for forbedring.':pct>=40?'Du er på riktig vei, men bør repetere mer.':'Her bør du bruke litt mer tid på begrepene.';
  const wr=quizAnswers.filter(a=>!a.correct);
  let wh='';if(wr.length)wh=`<div class="quiz-wrong-list"><h3>Begreper å se på igjen</h3>${wr.map(w=>`<div class="quiz-wrong-item"><strong>${w.term}</strong><br>${w.definition}</div>`).join('')}</div>`;
  let dots='';for(let i=0;i<QL;i++)dots+=`<div class="quiz-dot ${quizAnswers[i].correct?'correct':'wrong'}"></div>`;
  a.innerHTML=`<div class="quiz-result"><h2>Resultat</h2><div class="quiz-score-bar" style="margin-top:1rem">${dots}</div><div class="score-big">${quizScore} / ${QL}</div><p>${msg}</p>${wh}<button class="quiz-next-btn" onclick="startQuiz()">Prøv igjen</button></div>`;
}

// ── DASHBOARD ──
function renderDashboard(){
  const d=document.getElementById('dashboard'),p=lp();
  let kn=0,pr=0,un=0;
  TERMS.forEach(t=>{const s=(p.terms[t.t]||{}).status||'unseen';if(s==='know')kn++;else if(s==='practice')pr++;else un++;});
  let bars='';topics.forEach(cat=>{const ct=TERMS.filter(t=>t.c===cat);let ck=0,cp=0;ct.forEach(t=>{const s=(p.terms[t.t]||{}).status||'unseen';if(s==='know')ck++;else if(s==='practice')cp++;});const gp=Math.round(ck/ct.length*100),ap=Math.round(cp/ct.length*100);bars+=`<div class="dash-bar-row"><div class="dash-bar-label">${cat}</div><div class="dash-bar-track"><div class="dash-bar-green" style="width:${gp}%"></div><div class="dash-bar-amber" style="width:${ap}%"></div></div><div class="dash-bar-pct">${gp}%</div></div>`;});
  let hh='';if(p.quizHistory&&p.quizHistory.length){hh='<div class="dash-history">'+[...p.quizHistory].reverse().map(h=>{const dt=new Date(h.date);return`<div class="dash-history-item"><span class="hist-date">${dt.toLocaleDateString('nb-NO',{day:'numeric',month:'short'})} ${dt.toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit'})}</span><span class="hist-score">${h.score}/${h.total} (${Math.round(h.score/h.total*100)}%)</span></div>`;}).join('')+'</div>';}else hh='<div class="dash-empty">Ingen quizer tatt ennå.</div>';
  const wt=TERMS.filter(t=>{const s=p.terms[t.t];return s&&s.qw>0&&s.status!=='know';}).sort((a,b)=>(p.terms[b.t].qw-p.terms[b.t].qc)-(p.terms[a.t].qw-p.terms[a.t].qc)).slice(0,8);
  let wh='';if(wt.length)wh=wt.map(t=>{const s=p.terms[t.t],tot=s.qc+s.qw;return`<div class="dash-bar-row"><div class="dash-bar-label">${t.t}</div><div class="dash-bar-track"><div class="dash-bar-green" style="width:${Math.round(s.qc/tot*100)}%"></div></div><div class="dash-bar-pct">${s.qc}/${tot}</div></div>`;}).join('');
  d.innerHTML=`<div class="dash-card"><h2>Oversikt</h2><div class="dash-stats"><div class="dash-stat"><div class="stat-num green">${kn}</div><div class="stat-label">Kan</div></div><div class="dash-stat"><div class="stat-num amber">${pr}</div><div class="stat-label">Øver på</div></div><div class="dash-stat"><div class="stat-num red">${un}</div><div class="stat-label">Ikke sett</div></div></div></div><div class="dash-card"><h2>Fremgang per tema</h2>${bars}</div>${wt.length?`<div class="dash-card"><h2>Begreper å jobbe med</h2>${wh}</div>`:''}<div class="dash-card"><h2>Quizhistorikk</h2>${hh}</div><div style="text-align:center;margin-top:0.5rem"><button class="reset-btn" onclick="resetProgress()">Nullstill all fremgang</button></div>`;
}

// ── KEYBOARD & TOUCH ──
document.addEventListener('keydown',e=>{if(currentMode==='list'||currentMode==='quiz'||currentMode==='progress')return;if(e.key==='ArrowRight')nextCard();else if(e.key==='ArrowLeft')prevCard();else if(e.key===' '){e.preventDefault();flipCard();}});
let tsx=0;document.getElementById('cardArea').addEventListener('touchstart',e=>{tsx=e.changedTouches[0].screenX;},{passive:true});document.getElementById('cardArea').addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tsx;if(Math.abs(d)>60){d<0?nextCard():prevCard();}},{passive:true});

// ── INIT ──
document.getElementById('flashcardFilter').style.display='flex';
buildDeck();
</script>
